<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Detalle — ArisShop</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/src/css/detalle.css"/>

</head>
<body>

<!-- Cart bg -->
<div class="cart-overlay-bg" id="cartBg" onclick="closeCart()"></div>

<!-- ── NAV ── -->
<nav>
  <a href="/home.html" class="nav-logo">Aris<span>Shop</span></a>
  <div class="nav-right">
    <ul class="nav-center">
      <li><a href="/home.html">Inicio</a></li>
      <li><a href="/src/pages/catalogo.html" class="active">Catálogo</a></li>
    </ul>
    <button class="cart-pill" onclick="openCart()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span class="cart-pill-count" id="cartCount">0</span>
    </button>
  </div>
</nav>

<!-- ── PAGE ── -->
<div class="page-wrap">

  <!-- Breadcrumb -->
  <div class="breadcrumb">
    <a href="/home.html">Inicio</a>
    <span>/</span>
    <a href="/src/pages/catalogo.html">Catálogo</a>
    <span>/</span>
    <span id="breadName">Cargando...</span>
  </div>

  <!-- Detalle -->
  <div class="detalle-grid" id="detalleContainer">
    <div class="detalle-imagen" id="detalleImagen">
      <div class="detalle-img-preview" id="detalleImage">Imagen</div>
      <span class="badge" id="detalleBadge"></span>
    </div>
    <div class="detalle-info">
      <div class="detalle-categoria" id="detalleCategoria">Categoría</div>
      <h1 class="detalle-nombre" id="detalleNombre">Nombre</h1>
      <div class="detalle-precio" id="detallePrecio"></div>
      <div class="detalle-stock" id="detalleStock">En stock</div>
      <div class="detalle-specs" id="detalleSpecs"></div>
      <div class="detalle-desc" id="detalleDesc">Descripción del producto.</div>
      <div class="detalle-actions">
        <div class="qty-selector">
          <button onclick="changeQtySelector(-1)">−</button>
          <span id="qtySelector">1</span>
          <button onclick="changeQtySelector(1)">+</button>
        </div>
        <button class="btn-primary" onclick="addDetailToCart()">Agregar al carrito</button>
        <button class="btn-secondary" onclick="window.history.back()">Volver</button>
      </div>
    </div>
  </div>

  <!-- Productos relacionados -->
  <div>
    <h2 class="relacionados-titulo">Productos relacionados</h2>
    <div class="relacionados-grid" id="relacionadosGrid"></div>
  </div>

</div>

<!-- ── CART DRAWER ── -->
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-head">
    <div class="cart-head-title">Tu Carrito</div>
    <button class="cart-x" onclick="closeCart()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cart-scroll">
    <div class="cart-empty-msg" id="cartEmptyMsg">
      <span class="cart-empty-icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:.35;display:block;margin:0 auto 12px"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      </span>
      Tu carrito está vacío
    </div>
    <div id="cartItemsEl"></div>
  </div>
  <div class="cart-foot">
    <div class="cart-total-row">
      <div class="cart-total-lbl">Total</div>
      <div class="cart-total-amt" id="cartTotal">$0</div>
    </div>
    <button class="checkout-btn-main">Finalizar Compra →</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
<script src="/src/js/utils.js"></script>
<script src="/src/js/data.js"></script>
<script src="/src/js/cart.js"></script>
<script src="/src/js/detalle.js"></script>
</body>
</html>
